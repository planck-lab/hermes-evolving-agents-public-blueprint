<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Bounded agent learning loop</title>
  <desc id="desc">High-fidelity diagram of the bounded Hermes agent learning loop with governance, telemetry, review, intervention and measurement layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08101d"/>
      <stop offset="55%" stop-color="#101935"/>
      <stop offset="100%" stop-color="#140f2a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.15" cy="0.12" r="0.75">
      <stop offset="0%" stop-color="#7cc4ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#7cc4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.92" cy="0.08" r="0.7">
      <stop offset="0%" stop-color="#9b8cff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9b8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L0,14 L14,7 z" fill="#7cc4ff"/>
    </marker>
    <style>
      .eyebrow{font:700 24px Inter,Arial,sans-serif;letter-spacing:.12em;text-transform:uppercase;fill:#7cc4ff}
      .title{font:800 54px Inter,Arial,sans-serif;fill:#edf2ff}
      .subtitle{font:500 24px Inter,Arial,sans-serif;fill:#b7c6e7}
      .boxTitle{font:700 28px Inter,Arial,sans-serif;fill:#edf2ff}
      .boxText{font:500 19px Inter,Arial,sans-serif;fill:#a8b8d8}
      .small{font:600 18px Inter,Arial,sans-serif;fill:#9fb0d1}
      .pill{font:700 19px Inter,Arial,sans-serif;fill:#dce8ff}
    </style>
  </defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <rect width="1600" height="920" fill="url(#glowA)"/>
  <rect width="1600" height="920" fill="url(#glowB)"/>
  <rect x="54" y="46" width="1492" height="828" rx="34" fill="rgba(8,12,26,0.52)" stroke="rgba(159,176,209,0.15)"/>

  <text x="96" y="118" class="eyebrow">Figure A · bounded learning loop</text>
  <text x="96" y="182" class="title">Governed agent maturity architecture</text>
  <text x="96" y="224" class="subtitle">Signal → review → intervention → runtime → measurement, all constrained by explicit oversight.</text>

  <g filter="url(#shadow)">
    <rect x="116" y="330" width="228" height="168" rx="28" fill="rgba(124,196,255,0.14)" stroke="rgba(124,196,255,0.54)"/>
    <text x="230" y="390" text-anchor="middle" class="boxTitle">Signal</text>
    <text x="230" y="426" text-anchor="middle" class="boxText">telemetry</text>
    <text x="230" y="452" text-anchor="middle" class="boxText">alerts</text>
    <text x="230" y="478" text-anchor="middle" class="boxText">candidate issues</text>

    <rect x="406" y="330" width="248" height="168" rx="28" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.44)"/>
    <text x="530" y="390" text-anchor="middle" class="boxTitle">Review</text>
    <text x="530" y="426" text-anchor="middle" class="boxText">human challenge</text>
    <text x="530" y="452" text-anchor="middle" class="boxText">triage</text>
    <text x="530" y="478" text-anchor="middle" class="boxText">priority decision</text>

    <rect x="726" y="330" width="274" height="168" rx="28" fill="rgba(251,191,36,0.11)" stroke="rgba(251,191,36,0.4)"/>
    <text x="863" y="390" text-anchor="middle" class="boxTitle">Intervention</text>
    <text x="863" y="426" text-anchor="middle" class="boxText">conservative change</text>
    <text x="863" y="452" text-anchor="middle" class="boxText">gate / route / patch</text>
    <text x="863" y="478" text-anchor="middle" class="boxText">reversible by design</text>

    <rect x="1072" y="330" width="230" height="168" rx="28" fill="rgba(155,140,255,0.12)" stroke="rgba(155,140,255,0.42)"/>
    <text x="1187" y="390" text-anchor="middle" class="boxTitle">Runtime</text>
    <text x="1187" y="426" text-anchor="middle" class="boxText">bounded agent</text>
    <text x="1187" y="452" text-anchor="middle" class="boxText">task execution</text>
    <text x="1187" y="478" text-anchor="middle" class="boxText">observable behavior</text>

    <rect x="1350" y="330" width="154" height="168" rx="28" fill="rgba(251,113,133,0.12)" stroke="rgba(251,113,133,0.44)"/>
    <text x="1427" y="390" text-anchor="middle" class="boxTitle">Measure</text>
    <text x="1427" y="426" text-anchor="middle" class="boxText">effect</text>
    <text x="1427" y="452" text-anchor="middle" class="boxText">caveats</text>
    <text x="1427" y="478" text-anchor="middle" class="boxText">counterfactual</text>
  </g>

  <line x1="344" y1="414" x2="406" y2="414" stroke="#7cc4ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="654" y1="414" x2="726" y2="414" stroke="#7cc4ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1000" y1="414" x2="1072" y2="414" stroke="#7cc4ff" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1302" y1="414" x2="1350" y2="414" stroke="#7cc4ff" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="188" y="590" width="1204" height="96" rx="24" fill="rgba(16,25,53,0.72)" stroke="rgba(159,176,209,0.16)" stroke-dasharray="10 8"/>
  <text x="790" y="640" text-anchor="middle" class="boxTitle" style="font-size:32px">Governance layer</text>
  <text x="790" y="676" text-anchor="middle" class="small">bounded autonomy · documentation · human oversight · reversibility · measurement discipline</text>

  <rect x="110" y="744" width="390" height="70" rx="22" fill="rgba(124,196,255,0.12)" stroke="rgba(124,196,255,0.24)"/>
  <text x="305" y="786" text-anchor="middle" class="pill">NIST AI RMF / GenAI Profile</text>
  <rect x="540" y="744" width="250" height="70" rx="22" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.24)"/>
  <text x="665" y="786" text-anchor="middle" class="pill">EU AI Act</text>
  <rect x="830" y="744" width="666" height="70" rx="22" fill="rgba(155,140,255,0.12)" stroke="rgba(155,140,255,0.24)"/>
  <text x="1163" y="786" text-anchor="middle" class="pill">Visible boundary between internal experimentation and public claims</text>
</svg>
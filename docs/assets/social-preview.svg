<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Evolving Agents Roadmap</title>
  <desc id="desc">Evidence-first blueprint for bounded agent maturity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09101d"/>
      <stop offset="50%" stop-color="#111b36"/>
      <stop offset="100%" stop-color="#120f29"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#7cc4ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7cc4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#9b8cff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#9b8cff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .eyebrow{font:700 24px Inter,Arial,sans-serif;letter-spacing:.12em;text-transform:uppercase;fill:#7cc4ff}
      .title{font:800 64px Inter,Arial,sans-serif;fill:#edf2ff}
      .subtitle{font:500 28px Inter,Arial,sans-serif;fill:#b5c5e8}
      .pill{font:700 24px Inter,Arial,sans-serif;fill:#dbe8ff}
      .small{font:500 22px Inter,Arial,sans-serif;fill:#9fb0d1}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <rect x="60" y="58" width="1080" height="514" rx="34" fill="rgba(10,16,30,0.58)" stroke="rgba(159,176,209,0.18)"/>
  <text x="110" y="128" class="eyebrow">Evidence-first blueprint</text>
  <text x="110" y="218" class="title">Hermes Evolving</text>
  <text x="110" y="290" class="title">Agents Roadmap</text>
  <text x="110" y="352" class="subtitle">Bounded agent maturity, governance framing,</text>
  <text x="110" y="392" class="subtitle">and challengeable public claims.</text>

  <rect x="110" y="444" width="234" height="58" rx="29" fill="rgba(124,196,255,0.14)" stroke="rgba(124,196,255,0.3)"/>
  <text x="227" y="480" text-anchor="middle" class="pill">DE / EN</text>
  <rect x="364" y="444" width="336" height="58" rx="29" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.24)"/>
  <text x="532" y="480" text-anchor="middle" class="pill">Bounded autonomy</text>
  <rect x="720" y="444" width="304" height="58" rx="29" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.24)"/>
  <text x="872" y="480" text-anchor="middle" class="pill">Challengeable claims</text>

  <text x="110" y="544" class="small">Public website, README, citations, diagrams, evidence tables, and release-ready documentation.</text>
</svg>

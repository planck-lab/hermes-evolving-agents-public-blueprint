<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Evidence ladder for bounded claims</title>
  <desc id="desc">Upgraded visual ladder from observation to bounded publication, showing caveats and support states.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09101d"/>
      <stop offset="58%" stop-color="#0f1833"/>
      <stop offset="100%" stop-color="#151026"/>
    </linearGradient>
    <radialGradient id="spotA" cx="0.18" cy="0.18" r="0.72">
      <stop offset="0%" stop-color="#7cc4ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7cc4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotB" cx="0.85" cy="0.2" r="0.65">
      <stop offset="0%" stop-color="#9b8cff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#9b8cff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .eyebrow{font:700 24px Inter,Arial,sans-serif;letter-spacing:.12em;text-transform:uppercase;fill:#7cc4ff}
      .title{font:800 54px Inter,Arial,sans-serif;fill:#edf2ff}
      .subtitle{font:500 24px Inter,Arial,sans-serif;fill:#b7c6e7}
      .stepTitle{font:700 28px Inter,Arial,sans-serif;fill:#edf2ff}
      .stepText{font:500 19px Inter,Arial,sans-serif;fill:#a8b8d8}
      .label{font:700 18px Inter,Arial,sans-serif;fill:#dce8ff}
      .small{font:500 18px Inter,Arial,sans-serif;fill:#9fb0d1}
    </style>
  </defs>
  <rect width="1600" height="920" fill="url(#bg2)"/>
  <rect width="1600" height="920" fill="url(#spotA)"/>
  <rect width="1600" height="920" fill="url(#spotB)"/>
  <rect x="58" y="52" width="1484" height="816" rx="34" fill="rgba(8,12,26,0.52)" stroke="rgba(159,176,209,0.15)"/>

  <text x="98" y="122" class="eyebrow">Figure B · evidence ladder</text>
  <text x="98" y="186" class="title">How stronger public claims are earned</text>
  <text x="98" y="228" class="subtitle">Observation, inference, decision, measurement, publication — each stage narrows what can be said responsibly.</text>

  <g>
    <path d="M170 680 L1430 680" stroke="rgba(124,196,255,0.36)" stroke-width="8" stroke-linecap="round"/>
    <path d="M170 680 L1430 680" stroke="#7cc4ff" stroke-width="2" stroke-dasharray="14 12"/>

    <g transform="translate(170 0)">
      <rect x="0" y="498" width="190" height="150" rx="28" fill="rgba(124,196,255,0.14)" stroke="rgba(124,196,255,0.54)"/>
      <text x="95" y="560" text-anchor="middle" class="stepTitle">Observe</text>
      <text x="95" y="595" text-anchor="middle" class="stepText">internal artifact</text>
      <text x="95" y="622" text-anchor="middle" class="stepText">raw evidence</text>
      <circle cx="95" cy="680" r="26" fill="#7cc4ff"/>
      <text x="95" y="687" text-anchor="middle" class="label" style="fill:#08101d">1</text>
    </g>

    <g transform="translate(430 0)">
      <rect x="0" y="426" width="220" height="222" rx="28" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.44)"/>
      <text x="110" y="496" text-anchor="middle" class="stepTitle">Interpret</text>
      <text x="110" y="531" text-anchor="middle" class="stepText">bounded inference</text>
      <text x="110" y="558" text-anchor="middle" class="stepText">support status</text>
      <text x="110" y="585" text-anchor="middle" class="stepText">caveats included</text>
      <circle cx="110" cy="680" r="26" fill="#4ade80"/>
      <text x="110" y="687" text-anchor="middle" class="label" style="fill:#08101d">2</text>
    </g>

    <g transform="translate(730 0)">
      <rect x="0" y="344" width="226" height="304" rx="28" fill="rgba(251,191,36,0.11)" stroke="rgba(251,191,36,0.4)"/>
      <text x="113" y="422" text-anchor="middle" class="stepTitle">Decide</text>
      <text x="113" y="458" text-anchor="middle" class="stepText">governance choice</text>
      <text x="113" y="485" text-anchor="middle" class="stepText">intervention rule</text>
      <text x="113" y="512" text-anchor="middle" class="stepText">explicit scope</text>
      <text x="113" y="539" text-anchor="middle" class="stepText">reversibility</text>
      <circle cx="113" cy="680" r="26" fill="#fbbf24"/>
      <text x="113" y="687" text-anchor="middle" class="label" style="fill:#08101d">3</text>
    </g>

    <g transform="translate(1032 0)">
      <rect x="0" y="426" width="220" height="222" rx="28" fill="rgba(155,140,255,0.12)" stroke="rgba(155,140,255,0.42)"/>
      <text x="110" y="496" text-anchor="middle" class="stepTitle">Measure</text>
      <text x="110" y="531" text-anchor="middle" class="stepText">effect estimate</text>
      <text x="110" y="558" text-anchor="middle" class="stepText">counterfactual</text>
      <text x="110" y="585" text-anchor="middle" class="stepText">limitations visible</text>
      <circle cx="110" cy="680" r="26" fill="#9b8cff"/>
      <text x="110" y="687" text-anchor="middle" class="label" style="fill:#08101d">4</text>
    </g>

    <g transform="translate(1318 0)">
      <rect x="0" y="498" width="190" height="150" rx="28" fill="rgba(251,113,133,0.12)" stroke="rgba(251,113,133,0.44)"/>
      <text x="95" y="560" text-anchor="middle" class="stepTitle">Publish</text>
      <text x="95" y="595" text-anchor="middle" class="stepText">bounded claim</text>
      <text x="95" y="622" text-anchor="middle" class="stepText">auditable summary</text>
      <circle cx="95" cy="680" r="26" fill="#fb7185"/>
      <text x="95" y="687" text-anchor="middle" class="label" style="fill:#08101d">5</text>
    </g>
  </g>

  <rect x="116" y="274" width="1380" height="76" rx="24" fill="rgba(16,25,53,0.72)" stroke="rgba(159,176,209,0.16)"/>
  <text x="806" y="320" text-anchor="middle" class="label">Rule: every stronger public statement needs a visible source trail, support status, and limitation set.</text>

  <rect x="118" y="760" width="410" height="88" rx="24" fill="rgba(124,196,255,0.12)" stroke="rgba(124,196,255,0.24)"/>
  <text x="323" y="808" text-anchor="middle" class="label">What enters</text>
  <text x="323" y="836" text-anchor="middle" class="small">signals, traces, notes, candidate deltas</text>

  <rect x="596" y="760" width="410" height="88" rx="24" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.24)"/>
  <text x="801" y="808" text-anchor="middle" class="label">What must not happen</text>
  <text x="801" y="836" text-anchor="middle" class="small">aspiration or local success presented as stable fact</text>

  <rect x="1084" y="760" width="412" height="88" rx="24" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.24)"/>
  <text x="1290" y="808" text-anchor="middle" class="label">What exits</text>
  <text x="1290" y="836" text-anchor="middle" class="small">bounded public communication with explicit caveats</text>
</svg>